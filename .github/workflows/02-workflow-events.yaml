name: 02 - Workflow Events
on:
    workflow_dispatch:

jobs:
    echo-hello:
        runs-on: ubuntu-latest
        steps:
            - name: Show the triggering event
              run: echo "The event that triggered this workflow is ${{ github.event_name }}"
            - name: Show the commit message
              run: echo "The commit message is ${{ github.event.head_commit.message }}"
